<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}KNAPS Invoice Management Software{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --m3-scheme-primary: #4f46e5;
            --m3-scheme-on-primary: #ffffff;
            --m3-scheme-primary-container: #e0e7ff;
            --m3-scheme-on-primary-container: #312e81;
            --m3-scheme-secondary: #0891b2;
            --m3-scheme-on-secondary: #ffffff;
            --m3-scheme-secondary-container: #cffafe;
            --m3-scheme-on-secondary-container: #164e63;
            --m3-scheme-tertiary: #7c3aed;
            --m3-scheme-on-tertiary: #ffffff;
            --m3-scheme-tertiary-container: #ede9fe;
            --m3-scheme-on-tertiary-container: #4c1d95;
            --m3-scheme-error: #dc2626;
            --m3-scheme-on-error: #ffffff;
            --m3-scheme-error-container: #fee2e2;
            --m3-scheme-on-error-container: #991b1b;
            --m3-scheme-background: #f8fafc;
            --m3-scheme-on-background: #1e293b;
            --m3-scheme-surface: #ffffff;
            --m3-scheme-on-surface: #1e293b;
            --m3-scheme-surface-variant: #f1f5f9;
            --m3-scheme-on-surface-variant: #475569;
            --m3-scheme-outline: #cbd5e1;
            --m3-scheme-outline-variant: #e2e8f0;

            --m3-elevation-1: 0 1px 2px 0 rgba(0,0,0,0.05);
            --m3-elevation-2: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px -1px rgba(0,0,0,0.1);
            --m3-elevation-3: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
            --m3-elevation-4: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
            
            --m3-radius-small: 8px;
            --m3-radius-medium: 12px;
            --m3-radius-large: 16px;
            --m3-radius-xl: 24px;
            
            --m3-motion-duration-short: 150ms;
            --m3-motion-duration-medium: 300ms;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            background-color: var(--m3-scheme-background);
            color: var(--m3-scheme-on-surface);
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .navbar {
            background-color: var(--m3-scheme-surface);
            border-bottom: 1px solid var(--m3-scheme-outline-variant);
            box-shadow: var(--m3-elevation-1);
            padding: 0.75rem 1.5rem;
        }
        
        .navbar-brand {
            color: var(--m3-scheme-primary);
            font-weight: 600;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .navbar-brand:hover {
            color: var(--m3-scheme-primary);
        }
        
        .navbar .nav-link {
            color: var(--m3-scheme-on-surface-variant);
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: var(--m3-radius-large);
            transition: all var(--m3-motion-duration-short) ease;
            margin: 0 0.25rem;
        }
        
        .navbar .nav-link:hover {
            color: var(--m3-scheme-primary);
            background-color: var(--m3-scheme-primary-container);
        }
        
        .navbar .nav-link.active {
            color: var(--m3-scheme-on-primary-container);
            background-color: var(--m3-scheme-primary-container);
        }
        
        .sidebar {
            min-height: calc(100vh - 56px);
            background-color: var(--m3-scheme-surface);
            border-right: 1px solid var(--m3-scheme-outline-variant);
        }
        
        .sidebar .nav-link {
            color: var(--m3-scheme-on-surface);
            padding: 12px 20px;
            font-weight: 500;
            border-radius: 0;
            border-left: 3px solid transparent;
            transition: all var(--m3-motion-duration-short) ease;
        }
        
        .sidebar .nav-link:hover {
            background-color: var(--m3-scheme-surface-variant);
            color: var(--m3-scheme-primary);
        }
        
        .sidebar .nav-link.active {
            background-color: var(--m3-scheme-primary-container);
            color: var(--m3-scheme-on-primary-container);
            border-left-color: var(--m3-scheme-primary);
        }
        
        .card {
            border: none;
            box-shadow: var(--m3-elevation-1);
            border-radius: var(--m3-radius-large);
            background-color: var(--m3-scheme-surface);
            overflow: hidden;
        }
        
        .card-body {
            padding: 0;
        }
        
        .card:hover {
            box-shadow: var(--m3-elevation-2);
        }
        
        .card-header {
            background-color: transparent;
            border-bottom: 1px solid var(--m3-scheme-outline-variant);
            padding: 1rem 1.5rem;
        }
        
        .card-body {
            padding: 1.5rem;
        }
        
        .btn {
            font-family: inherit;
            font-weight: 500;
            font-size: 0.875rem;
            padding: 0.625rem 1.25rem;
            border-radius: var(--m3-radius-small);
            transition: all var(--m3-motion-duration-short) ease;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .btn:focus {
            box-shadow: 0 0 0 2px var(--m3-scheme-surface), 0 0 0 4px var(--m3-scheme-primary);
        }
        
        .btn-primary {
            background-color: var(--m3-scheme-primary);
            color: var(--m3-scheme-on-primary);
        }
        
        .btn-primary:hover {
            background-color: #4338ca;
            box-shadow: var(--m3-elevation-2);
        }
        
        .btn-secondary {
            background-color: var(--m3-scheme-surface-variant);
            color: var(--m3-scheme-on-surface-variant);
        }
        
        .btn-secondary:hover {
            background-color: #e2e8f0;
        }
        
        .btn-outline-primary {
            background-color: transparent;
            border: 1px solid var(--m3-scheme-outline);
            color: var(--m3-scheme-primary);
        }
        
        .btn-outline-primary:hover {
            background-color: var(--m3-scheme-primary-container);
            border-color: var(--m3-scheme-primary);
        }
        
        .btn-outline-secondary {
            background-color: transparent;
            border: 1px solid var(--m3-scheme-outline);
            color: var(--m3-scheme-on-surface-variant);
        }
        
        .btn-outline-secondary:hover {
            background-color: var(--m3-scheme-surface-variant);
        }
        
        .btn-success {
            background-color: #059669;
            color: white;
        }
        
        .btn-success:hover {
            background-color: #047857;
        }
        
        .btn-danger {
            background-color: var(--m3-scheme-error);
            color: var(--m3-scheme-on-error);
        }
        
        .btn-danger:hover {
            background-color: #b91c1c;
        }
        
        .btn-warning {
            background-color: #d97706;
            color: white;
        }
        
        .btn-warning:hover {
            background-color: #b45309;
        }
        
        .btn-info {
            background-color: var(--m3-scheme-secondary);
            color: var(--m3-scheme-on-secondary);
        }
        
        .btn-info:hover {
            background-color: #0e7490;
        }
        
        .btn-lg {
            padding: 0.875rem 1.75rem;
            font-size: 1rem;
            border-radius: var(--m3-radius-medium);
        }
        
        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.8125rem;
        }
        
        .form-control, .form-select {
            border: 1px solid var(--m3-scheme-outline);
            border-radius: var(--m3-radius-small);
            padding: 0.625rem 0.875rem;
            font-size: 0.875rem;
            background-color: var(--m3-scheme-surface);
            transition: all var(--m3-motion-duration-short) ease;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--m3-scheme-primary);
            box-shadow: 0 0 0 3px var(--m3-scheme-primary-container);
        }
        
        .form-control::placeholder {
            color: var(--m3-scheme-on-surface-variant);
            opacity: 0.7;
        }
        
        .form-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--m3-scheme-on-surface-variant);
            margin-bottom: 0.375rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .table {
            --bs-table-bg: transparent;
            --bs-table-striped-bg: var(--m3-scheme-surface-variant);
            --bs-table-hover-bg: var(--m3-scheme-primary-container);
            font-size: 0.875rem;
        }
        
        .table thead th {
            background-color: var(--m3-scheme-surface-variant);
            color: var(--m3-scheme-on-surface-variant);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0.875rem 1rem;
            border-bottom: 1px solid var(--m3-scheme-outline);
        }
        
        .table tbody td {
            padding: 0.875rem 1rem;
            vertical-align: middle;
            border-bottom: 1px solid var(--m3-scheme-outline-variant);
        }
        
        .table tbody tr:hover td {
            background-color: var(--m3-scheme-primary-container);
        }
        
        .alert {
            border: none;
            border-radius: var(--m3-radius-medium);
            padding: 1rem 1.25rem;
            font-weight: 500;
        }
        
        .alert-success {
            background-color: #d1fae5;
            color: #065f46;
        }
        
        .alert-warning {
            background-color: #fef3c7;
            color: #92400e;
        }
        
        .alert-danger {
            background-color: var(--m3-scheme-error-container);
            color: var(--m3-scheme-on-error-container);
        }
        
        .alert-info {
            background-color: var(--m3-scheme-secondary-container);
            color: var(--m3-scheme-on-secondary-container);
        }
        
        .badge {
            font-weight: 500;
            padding: 0.35em 0.65em;
            border-radius: var(--m3-radius-small);
        }
        
        .modal-content {
            border: none;
            border-radius: var(--m3-radius-xl);
            box-shadow: var(--m3-elevation-4);
        }
        
        .modal-header {
            border-bottom: 1px solid var(--m3-scheme-outline-variant);
            padding: 1.5rem;
        }
        
        .modal-body {
            padding: 1.5rem;
        }
        
        .modal-footer {
            border-top: 1px solid var(--m3-scheme-outline-variant);
            padding: 1rem 1.5rem;
        }
        
        .modal-title {
            font-weight: 600;
            color: var(--m3-scheme-on-surface);
        }
        
        .dropdown-menu {
            border: none;
            border-radius: var(--m3-radius-medium);
            box-shadow: var(--m3-elevation-3);
            padding: 0.5rem;
        }
        
        .dropdown-item {
            border-radius: var(--m3-radius-small);
            padding: 0.5rem 1rem;
            font-weight: 500;
        }
        
        .dropdown-item:hover {
            background-color: var(--m3-scheme-primary-container);
            color: var(--m3-scheme-on-primary-container);
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-weight: 600;
            color: var(--m3-scheme-on-surface);
        }
        
        .text-muted {
            color: var(--m3-scheme-on-surface-variant) !important;
        }
        
        .page-item.active .page-link {
            background-color: var(--m3-scheme-primary);
            border-color: var(--m3-scheme-primary);
        }
        
        .page-link {
            color: var(--m3-scheme-on-surface);
            border-radius: var(--m3-radius-small);
            margin: 0 0.125rem;
        }
        
        .page-link:hover {
            background-color: var(--m3-scheme-primary-container);
            color: var(--m3-scheme-on-primary-container);
        }
        
        @media print {
            .no-print { display: none !important; }
        }
        
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light fixed-top no-print">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('dashboard') }}">
                <i class="bi bi-receipt-fill"></i> KNAPS Invoice Management Software
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('parties') }}">Parties</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('manage_invoices') }}">Invoices</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('settings') }}">Settings</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container-fluid" style="margin-top: 80px;">
        <div class="row justify-content-center">
            {% block content %}{% endblock %}
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
